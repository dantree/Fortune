<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="오늘의 운세, 로또, MBTI 궁합, 일주·시주. 만세력 기준 무료 사주 도구.">
  <title>사주 도구 | 오늘 운세·궁합·일주</title>
  <script src="config.js"></script>
  <script src="js/saju-engine.js"></script>
  <script src="js/site.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9648839818105934" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f3f0ff;
      --surface: #fff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --primary: #6b4eff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background:
        radial-gradient(ellipse at top, #ebe4ff 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 16px 16px 28px; }
    .hook {
      border-radius: 20px;
      padding: 20px 18px 18px;
      margin-bottom: 10px;
      color: #fff;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.25), transparent 42%),
        linear-gradient(150deg, #4c1d95, #6b4eff 50%, #7c3aed);
      box-shadow: 0 10px 28px rgba(76, 29, 149, .25);
    }
    .hook-kicker { font-size: 11px; font-weight: 700; opacity: .8; }
    .hook h1 { font-size: 22px; font-weight: 800; margin: 6px 0 10px; line-height: 1.3; }
    .hook-day {
      display: inline-block;
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,.18);
      padding: 6px 11px; border-radius: 999px; margin-bottom: 12px;
    }
    .hook-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hook-btn {
      display: block; text-align: center; text-decoration: none;
      padding: 12px 10px; border-radius: 12px; font-weight: 800; font-size: 13px;
    }
    .hook-btn.primary { background: #fff; color: #4c1d95; }
    .hook-btn.ghost { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); }
    .quick-link {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 12px 14px;
      background: #fff; border-radius: 12px; text-decoration: none; color: inherit;
      box-shadow: 0 4px 16px rgba(107,78,255,.1); font-size: 14px; font-weight: 700;
    }
    .quick-link span { color: var(--muted); font-weight: 500; font-size: 12px; }
    .ad-slot { display: none; margin: 16px 0 0; border-radius: 12px; overflow: hidden; }
    .ad-slot.filled { display: block; }
    .notice {
      margin-top: 18px; padding: 12px 14px;
      background: rgba(237, 233, 254, .85);
      border-radius: 12px; font-size: 11px; color: #5b21b6; line-height: 1.65;
    }
    footer { text-align: center; margin-top: 18px; font-size: 12px; color: var(--muted); }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="site-top"></div>

    <section class="hook">
      <div class="hook-kicker">TODAY · 만세력</div>
      <h1>오늘 내 흐름,<br>한눈에 볼까요?</h1>
      <div class="hook-day" id="hook-day">…</div>
      <div class="hook-row">
        <a class="hook-btn primary" href="tools/today.html">☀️ 운세</a>
        <a class="hook-btn ghost" href="tools/today.html#lotto">🎱 로또</a>
      </div>
    </section>

    <a class="quick-link" href="tools/daily-card.html">
      🃏 오늘의 카드 뽑기
      <span>키워드 한 장 →</span>
    </a>

    <nav id="site-hub" class="site-hub" aria-label="도구 목록"></nav>

    <div id="ad-top" class="ad-slot"></div>

    <div class="notice">
      양력·음력(KARI) · 입춘 2/4 · 시주 오서둔 · 같은 입력=같은 결과<br>
      로또는 오락용이며 당첨을 보장하지 않습니다.
    </div>

    <footer>
      <a href="https://kaltaelee.com" target="_blank" rel="noopener">kaltaelee.com</a> ·
      <a href="docs/CALCULATION.md">계산 기준</a> ·
      <a href="tests/verify.html">검증</a>
    </footer>
  </div>
  <script>
  (function () {
    window.SiteNav.mount('home');
    var SE = window.SajuEngine;
    var today = SE.todayDateStr();
    var day = SE.getDayPillar(today);
    document.getElementById('hook-day').textContent =
      today.replace(/-/g, '.') + ' · ' + day.pillar + ' · ' + day.oheng.icon + ' ' + day.oheng.labelKo;

    var cfg = (window.FORTUNE_CONFIG || {}).adsense;
    if (!cfg || !cfg.enabled || !cfg.slots.top) return;
    var el = document.getElementById('ad-top');
    el.innerHTML = '<ins class="adsbygoogle" style="display:block" data-ad-client="' + cfg.client +
      '" data-ad-slot="' + cfg.slots.top + '" data-ad-format="auto" data-full-width-responsive="true"></ins>';
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
    /* 광고가 실제로 채워졌을 때만 공간 확보 */
    var tries = 0;
    var timer = setInterval(function () {
      tries++;
      var ins = el.querySelector('ins.adsbygoogle');
      var filled = ins && (ins.getAttribute('data-ad-status') === 'filled' || el.offsetHeight > 20);
      if (filled) {
        el.classList.add('filled');
        clearInterval(timer);
      } else if (tries > 20) {
        clearInterval(timer);
      }
    }, 500);
  })();
  </script>
</body>
</html>
