<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산 검증 | 운세리</title>
  <script src="../js/vendor/korean-lunar-calendar.min.js"></script>
  <script src="../js/birth-date.js"></script>
  <script src="../js/solar-terms.js?v=1.4"></script>
  <script src="../js/saju-engine.js?v=1.4"></script>
  <script src="../js/mbti-compat.js"></script>
  <script src="../js/zodiac-compat.js"></script>
  <script src="../js/site.js"></script>
  <style>
    :root { --bg:#f8fafc; --text:#1e293b; --ok:#16a34a; --fail:#dc2626; --muted:#64748b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, 'SF Mono', Menlo, monospace; background: var(--bg); color: var(--text); padding: 24px 16px; font-size: 13px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-family: -apple-system, sans-serif; font-size: 20px; margin: 12px 0 16px; }
    a { color: #6b4eff; }
    .panel { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
    .ok { color: var(--ok); font-weight: 700; }
    .fail { color: var(--fail); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #f1f5f9; }
    th { color: var(--muted); font-weight: 600; }
    .pass { color: var(--ok); }
    .err { color: var(--fail); }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="site-top"></div>
    <h1>🧪 계산 엔진 검증</h1>

    <div class="panel" id="saju-summary"></div>
    <div class="panel">
      <strong>사주 검증 케이스</strong>
      <table id="cases"><thead><tr><th>날짜</th><th>일주</th><th>띠</th><th>사주년</th><th>결과</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="panel" id="mbti-panel"></div>
    <div class="panel" id="zodiac-panel"></div>
    <div class="panel" id="lunar-panel"></div>
  </div>
  <script>
  (function () {
    window.SiteNav.mount('verify');
    var SE = window.SajuEngine;
    var MC = window.MbtiCompat;
    var ZC = window.ZodiacCompat;
    var BD = window.BirthDate;

    var r = SE.runSelfTest();
    document.getElementById('saju-summary').innerHTML =
      '<strong>SajuEngine v' + SE.VERSION + '</strong> — ' +
      (r.ok ? '<span class="ok">ALL PASS (' + r.passed + ')</span>' :
        '<span class="fail">FAIL (' + r.failed.length + ')</span>') +
      (r.failed.length ? '<pre>' + r.failed.join('\n') + '</pre>' : '');

    var tbody = document.querySelector('#cases tbody');
    SE.VERIFY_CASES.forEach(function (tc) {
      if (tc.hour) {
        var h = SE.getHourPillar(tc.date, tc.time);
        var okH = h && h.pillar === tc.hour;
        var trH = document.createElement('tr');
        trH.innerHTML = '<td>' + tc.date + ' ' + tc.time + '</td><td colspan="3">시주 ' + (h && h.pillar) +
          '</td><td class="' + (okH ? 'pass">PASS' : 'err">FAIL') + '</td>';
        tbody.appendChild(trH);
        return;
      }
      var day = SE.getDayPillar(tc.date);
      var year = SE.getYearPillar(tc.date, tc.time || null);
      var ok = day.pillar === tc.day && year.animal === tc.yearAnimal && year.sajuYear === tc.sajuYear;
      if (tc.month) {
        var mo = SE.getMonthPillar(tc.date, tc.time || null);
        ok = ok && mo && mo.pillar === tc.month;
      }
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + tc.date + (tc.time ? ' ' + tc.time : '') + '</td><td>' + day.pillar +
        (tc.month && SE.getMonthPillar(tc.date) ? ' / ' + SE.getMonthPillar(tc.date).pillar : '') +
        '</td><td>' + year.animal +
        '</td><td>' + year.sajuYear + '</td><td class="' + (ok ? 'pass">PASS' : 'err">FAIL') + '</td>';
      tbody.appendChild(tr);
    });

    if (window.SolarTerms) {
      var lichun = SolarTerms.getLichun(2000);
      var panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = '<strong>SolarTerms</strong><br>2000 입춘 KST: ' + lichun.kst.dateTimeStr +
        ' · 1990-05-15 월주: ' + SE.getMonthPillar('1990-05-15').pillar;
      document.querySelector('.wrap').appendChild(panel);
    }

    var mbtiOk = true;
    var asym = 0;
    MC.TYPES.forEach(function (a) {
      MC.TYPES.forEach(function (b) {
        var s1 = MC.getScore(a, b);
        var s2 = MC.getScore(a, b);
        if (s1 !== s2 || s1 < 40 || s1 > 100) mbtiOk = false;
        if (a < b && MC.getScore(a, b) !== MC.getScore(b, a)) asym++;
      });
    });
    document.getElementById('mbti-panel').innerHTML =
      '<strong>MbtiCompat</strong> — 16×16=' + (MC.TYPES.length * MC.TYPES.length) + ' 셀<br>' +
      '결정론: ' + (mbtiOk ? '<span class="ok">PASS</span>' : '<span class="fail">FAIL</span>') + '<br>' +
      '대칭성: ' + (asym === 0 ? '<span class="ok">PASS</span>' : '<span class="fail">FAIL (' + asym + ')</span>') + '<br>' +
      'INTJ×ENFP: ' + MC.getScore('INTJ','ENFP') + '% / ENFP×INTJ: ' + MC.getScore('ENFP','INTJ') + '%';

    var ratOx = ZC.getCompat(0, 1);
    var ratHorse = ZC.getCompat(0, 6);
    document.getElementById('zodiac-panel').innerHTML =
      '<strong>ZodiacCompat</strong><br>' +
      '쥐×소(육합): ' + ratOx.score + '% ' + ratOx.label + '<br>' +
      '쥐×말(충): ' + ratHorse.score + '% ' + ratHorse.label;

    var lu = BD.lunarToSolar('2017-05-01', true);
    var so = BD.solarToLunar('2017-06-24');
    var luOk = lu.ok && lu.solar === '2017-06-24';
    var soOk = so.ok && so.lunar === '2017-05-01' && so.leap === true;
    document.getElementById('lunar-panel').innerHTML =
      '<strong>BirthDate / KARI 음력</strong><br>' +
      '음력 2017.05.01(윤) → 양력: ' + (lu.solar || '-') + ' ' +
      (luOk ? '<span class="ok">PASS</span>' : '<span class="fail">FAIL</span>') + '<br>' +
      '양력 2017.06.24 → 음력: ' + (so.lunar || '-') + (so.leap ? '(윤)' : '') + ' ' +
      (soOk ? '<span class="ok">PASS</span>' : '<span class="fail">FAIL</span>');
  })();
  </script>
</body>
</html>
