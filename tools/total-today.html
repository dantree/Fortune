<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="사주·띠·별자리를 합친 오늘의 총운. 한 장의 종합 풀이.">
  <title>오늘의 총운 | 사주 도구</title>
  <script src="../js/vendor/korean-lunar-calendar.min.js?v=1.4"></script>
  <script src="../js/birth-date.js?v=1.4"></script>
  <script src="../js/solar-terms.js?v=1.4"></script>
  <script src="../js/saju-engine.js?v=1.4"></script>
  <script src="../js/zodiac-compat.js?v=1.4"></script>
  <script src="../js/star-sign.js?v=1.4"></script>
  <script src="../js/oheng-story.js?v=1.4"></script>
  <script src="../js/total-fortune.js?v=1.4"></script>
  <script src="../js/site.js?v=1.4"></script>
  <style>
    :root { --bg:#f5f3ff; --text:#1a1a2e; --muted:#6b7280; --primary:#6b4eff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; }
    .app { max-width:480px; margin:0 auto; padding:16px 16px 28px; }
    h1 { font-size:22px; font-weight:800; margin-bottom:6px; }
    .hero { font-size:14px; color:var(--muted); margin-bottom:16px; line-height:1.55; }
    .card { background:#fff; border-radius:14px; padding:18px; box-shadow:0 4px 18px rgba(107,78,255,.1); margin-bottom:12px; }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    input, select { width:100%; padding:12px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:16px; margin-bottom:12px; background:#fafafa; }
    .btn { width:100%; padding:14px; border:none; border-radius:12px; background:linear-gradient(135deg,#6b4eff,#9333ea); color:#fff; font-weight:800; font-size:15px; cursor:pointer; }
    .result { display:none; } .result.show { display:block; }
    .hero-total { text-align:center; color:#fff; border-radius:18px; padding:24px 16px; margin-bottom:12px;
      background:linear-gradient(150deg,#4c1d95,#6b4eff 50%,#db2777); box-shadow:0 10px 28px rgba(76,29,149,.28); }
    .hero-total .score { font-size:56px; font-weight:900; line-height:1.1; }
    .hero-total .grade { font-size:16px; font-weight:800; margin-top:4px; }
    .hero-total .head { font-size:14px; margin-top:10px; line-height:1.55; opacity:.95; }
    .focus { margin-top:12px; font-size:13px; font-weight:700; background:rgba(255,255,255,.18); padding:10px 12px; border-radius:12px; line-height:1.5; }
    .sec { font-size:15px; font-weight:800; margin-bottom:8px; }
    .block { font-size:14px; line-height:1.8; color:#374151; }
    .layer { padding:12px 0; border-bottom:1px solid #f3f4f6; }
    .layer:last-child { border:none; }
    .layer .t { font-size:13px; font-weight:800; color:var(--primary); margin-bottom:4px; }
    .layer .sc { float:right; color:var(--primary); }
    .bar { height:8px; background:#f3f4f6; border-radius:999px; overflow:hidden; margin:8px 0 10px; }
    .bar i { display:block; height:100%; background:linear-gradient(90deg,#6b4eff,#db2777); }
    .links a { display:block; text-align:center; text-decoration:none; padding:12px; border-radius:12px; font-weight:800; font-size:14px; margin-top:8px; background:#ede9fe; color:#4c1d95; }
  </style>
</head>
<body>
  <div class="app">
    <div id="site-top"></div>
    <h1>☀️ 오늘의 총운</h1>
    <p class="hero">사주 흐름 · 띠 운세 · 별자리를 한곳에 모아<br>오늘의 최종 총평처럼 정리해 드립니다.</p>

    <div class="card">
      <label for="name">이름 (선택)</label>
      <input type="text" id="name" placeholder="예: 지은" maxlength="20">
      <label>달력</label>
      <div id="cal"></div>
      <label for="birth">생년월일</label>
      <input type="date" id="birth" min="1900-01-01" max="2050-12-31">
      <button type="button" class="btn" id="btn">오늘의 총운 보기</button>
    </div>

    <div class="result" id="result">
      <div class="hero-total">
        <div class="score" id="score">—</div>
        <div class="grade" id="grade"></div>
        <p class="head" id="headline"></p>
        <div class="focus" id="focus"></div>
      </div>
      <div class="card">
        <div class="sec">📜 종합 총평</div>
        <p class="block" id="synthesis"></p>
      </div>
      <div class="card">
        <div class="sec">📚 층별 풀이</div>
        <div id="layers"></div>
      </div>
      <div class="card links">
        <div class="sec">이어서 보기</div>
        <a href="full-saju.html">📖 풀사주</a>
        <a href="star-sign.html">⭐ 별자리</a>
        <a href="ddi-compat.html">🐉 띠 궁합</a>
        <a href="today.html">🎱 운세 · 로또</a>
      </div>
    </div>
  </div>
  <script>
  (function () {
    window.SiteNav.mount('total-today');
    var SE = window.SajuEngine, BD = window.BirthDate, TF = window.TotalFortune;
    var birth = document.getElementById('birth');
    birth.max = SE.todayDateStr();
    var field = BD.enhance({ name: 'total-cal', dateInput: birth, mountEl: document.getElementById('cal') });
    var saved = BD.loadBirth();
    if (saved) BD.applySaved(field, birth, saved);
    try {
      var prof = JSON.parse(localStorage.getItem('fortune_profile') || '{}');
      if (prof.name) document.getElementById('name').value = prof.name;
    } catch (e) {}

    function layerHtml(L) {
      if (!L) return '';
      return '<div class="layer"><div class="t">' + L.title +
        (L.score != null ? '<span class="sc">' + L.score + '%</span>' : '') + '</div>' +
        (L.score != null ? '<div class="bar"><i style="width:' + L.score + '%"></i></div>' : '') +
        '<div class="block">' + L.text + '</div></div>';
    }

    function show() {
      var v = field.getValue();
      if (!v.ok) return;
      BD.saveBirth(v);
      var name = document.getElementById('name').value.trim();
      try {
        var prof = JSON.parse(localStorage.getItem('fortune_profile') || '{}');
        prof.name = name;
        localStorage.setItem('fortune_profile', JSON.stringify(prof));
      } catch (e) {}

      var t = TF.getTotalToday({ solarDate: v.solar, name: name });
      document.getElementById('score').textContent = t.score + '%';
      document.getElementById('grade').textContent = t.emoji + ' ' + t.grade;
      document.getElementById('headline').textContent = t.headline;
      document.getElementById('focus').textContent = t.focus;
      document.getElementById('synthesis').textContent = t.synthesis;
      document.getElementById('layers').innerHTML =
        layerHtml(t.layers.saju) +
        layerHtml(t.layers.animal) +
        layerHtml(t.layers.star) +
        layerHtml(t.layers.oheng);

      document.getElementById('result').classList.add('show');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    document.getElementById('btn').addEventListener('click', show);
    if (saved && saved.date) show();
  })();
  </script>
</body>
</html>
