<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="일간 오행 성격을 전문가 톤으로 자세히 풀어 드립니다.">
  <title>내 오행 성격 | 운세리</title>
  <script src="../js/vendor/korean-lunar-calendar.min.js?v=1.4"></script>
  <script src="../js/birth-date.js?v=1.4"></script>
  <script src="../js/solar-terms.js?v=1.4"></script>
  <script src="../js/saju-engine.js?v=1.4"></script>
  <script src="../js/oheng-story.js?v=1.3"></script>
  <script src="../js/zodiac-compat.js?v=1.3"></script>
  <script src="../js/site.js?v=1.3"></script>
  <style>
    :root {
      --bg:#f3f0ff; --text:#1a1a2e; --muted:#6b7280; --primary:#6b4eff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 28px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .hero { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.55; }
    .card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 4px 18px rgba(107,78,255,.1); margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input[type=date] { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg,#6b4eff,#9333ea); color:#fff; font-weight:800; font-size:15px; cursor:pointer; }
    .result { display: none; }
    .result.show { display: block; }
    .hero-oh { border-radius: 18px; padding: 24px 18px; text-align: center; color: #fff; margin-bottom: 12px; }
    .hero-oh.wood{background:linear-gradient(145deg,#166534,#4caf50)}
    .hero-oh.fire{background:linear-gradient(145deg,#9f1239,#f44336)}
    .hero-oh.earth{background:linear-gradient(145deg,#a16207,#eab308);color:#1a1a2e}
    .hero-oh.metal{background:linear-gradient(145deg,#334155,#78909c)}
    .hero-oh.water{background:linear-gradient(145deg,#1e3a8a,#2196f3)}
    .hero-oh .big { font-size: 40px; font-weight: 900; letter-spacing: 2px; }
    .hero-oh .sub { margin-top: 6px; font-size: 14px; opacity: .95; }
    .hero-oh .nick { margin-top: 4px; font-size: 13px; opacity: .9; }
    .traits { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
    .traits span { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,.22); }
    .sec { font-size: 15px; font-weight: 800; margin-bottom: 8px; }
    .block { font-size: 14px; line-height: 1.8; color: #374151; margin-bottom: 12px; }
    .block .l { display: block; font-size: 12px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .meta { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="app">
    <div id="site-top"></div>
    <h1>🌿 내 오행 성격</h1>
    <p class="hero">일간(日干) 오행을 철학관 풀이처럼<br>기질·연애·일·그늘까지 자세히 풀어 드립니다.</p>

    <div class="card">
      <label>달력</label>
      <div id="cal-mount"></div>
      <label for="birth">생년월일</label>
      <input type="date" id="birth" min="1900-01-01" max="2050-12-31">
      <button type="button" class="btn" id="btn">자세히 풀이 보기</button>
    </div>

    <div class="result" id="result">
      <div class="hero-oh" id="hero">
        <div class="big" id="pillar">—</div>
        <div class="sub" id="oheng-label"></div>
        <div class="nick" id="nick"></div>
        <div class="traits" id="traits"></div>
      </div>
      <div class="card">
        <div class="sec">📜 오행 전문가 해설</div>
        <div id="story"></div>
        <p class="meta" id="meta"></p>
      </div>
      <div class="card" id="animal-card" style="display:none">
        <div class="sec">🐉 띠 기운도 함께</div>
        <div id="animal"></div>
      </div>
    </div>
  </div>
  <script>
  (function () {
    window.SiteNav.mount('oheng-me');
    var SE = window.SajuEngine;
    var BD = window.BirthDate;
    var OS = window.OhengStory;
    var ZC = window.ZodiacCompat;
    var birth = document.getElementById('birth');
    birth.max = SE.todayDateStr();
    var field = BD.enhance({
      name: 'oheng-cal',
      dateInput: birth,
      mountEl: document.getElementById('cal-mount')
    });
    var saved = BD.loadBirth();
    if (saved) BD.applySaved(field, birth, saved);

    function show() {
      var v = field.getValue();
      if (!v.ok) return;
      BD.saveBirth(v);
      var day = SE.getDayPillar(v.solar);
      var year = SE.getYearPillar(v.solar);
      var story = OS.getOhengStory(day.oheng.type, day.stem);
      var hero = document.getElementById('hero');
      hero.className = 'hero-oh ' + day.oheng.type;
      document.getElementById('pillar').textContent = day.pillar;
      document.getElementById('oheng-label').textContent =
        day.oheng.icon + ' ' + story.title;
      document.getElementById('nick').textContent = story.nick;
      document.getElementById('traits').innerHTML = story.keywords.map(function (t) {
        return '<span>#' + t + '</span>';
      }).join('');
      document.getElementById('story').innerHTML = story.sections.map(function (s) {
        return '<div class="block"><span class="l">' + s.label + '</span>' + s.text + '</div>';
      }).join('');
      document.getElementById('meta').textContent =
        (v.calendar === 'lunar' ? '음력 ' : '양력 ') + v.date.replace(/-/g, '.') +
        ' → 양력 ' + v.solar.replace(/-/g, '.') + ' · ' + year.animal + '띠';

      var ar = ZC.getAnimalProfileReading(year.animal);
      if (ar) {
        document.getElementById('animal-card').style.display = 'block';
        var A = ar.reading;
        document.getElementById('animal').innerHTML =
          '<div class="block"><span class="l">총평</span>' + A.opening + '</div>' +
          '<div class="block"><span class="l">기질</span>' + A.nature + '</div>' +
          '<div class="block"><span class="l">강점·그늘</span>' + A.strength + ' ' + A.shadow + '</div>' +
          '<div class="block"><span class="l">삶·관계</span>' + A.life + '</div>';
      }

      document.getElementById('result').classList.add('show');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('btn').addEventListener('click', show);
    if (saved && saved.date) show();
  })();
  </script>
</body>
</html>
