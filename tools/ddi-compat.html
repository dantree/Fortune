<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="입춘 기준 사주년 띠로 삼합·육합·충 궁합을 확인하세요.">
  <title>띠 궁합 | 사주 도구</title>
  <script src="../config.js"></script>
  <script src="../js/saju-engine.js"></script>
  <script src="../js/zodiac-compat.js"></script>
  <style>
    :root {
      --bg: #f5f3ff; --surface: #fff; --text: #1a1a2e; --muted: #6b7280;
      --primary: #6b4eff; --radius: 14px; --shadow: 0 4px 24px rgba(107,78,255,.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
    .back { font-size: 13px; color: var(--muted); text-decoration: none; display: block; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .hero { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input[type=date] { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); background: linear-gradient(135deg, var(--primary), #9333ea); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
    .result { display: none; text-align: center; }
    .result.show { display: block; }
    .score { font-size: 56px; font-weight: 900; color: var(--primary); margin: 8px 0; }
    .pair { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .rel { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; background: #ede9fe; color: #4c1d95; margin-bottom: 16px; }
    .rel.chung { background: #fee2e2; color: #991b1b; }
    .rel.yukhap, .rel.samhap { background: #dcfce7; color: #166534; }
    .detail { text-align: left; font-size: 14px; line-height: 1.7; color: #374151; padding: 14px; background: #fafafa; border-radius: 10px; }
    footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 20px; }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="../index.html">← 사주 도구 홈</a>
    <h1>🐉 띠 궁합</h1>
    <p class="hero">입춘(2/4) 기준 사주년 띠로 궁합을 봅니다</p>

    <div class="card">
      <label for="birth-a">나의 생년월일</label>
      <input type="date" id="birth-a" min="1900-01-01">
      <label for="birth-b">상대 생년월일</label>
      <input type="date" id="birth-b" min="1900-01-01">
      <button type="button" class="btn" id="btn-go">띠 궁합 보기</button>
    </div>

    <div class="card result" id="result">
      <div class="pair" id="pair">—</div>
      <div class="score" id="score">—%</div>
      <div class="rel" id="rel">—</div>
      <div class="detail" id="detail"></div>
    </div>

    <footer><a href="../docs/CALCULATION.md">계산 기준</a> · 12×12 고정표 · 랜덤 없음</footer>
  </div>
  <script>
  (function () {
    var SE = window.SajuEngine;
    var ZC = window.ZodiacCompat;
    var max = new Date().toISOString().slice(0, 10);
    document.getElementById('birth-a').max = max;
    document.getElementById('birth-b').max = max;

    var DETAIL = {
      '육합': '서로 끌리는 육합(六合) 관계입니다. 자연스럽게 맞아떨어지는 조합이에요.',
      '삼합': '삼합(三合)으로 같은 방향의 기운이 모입니다. 협력과 시너지가 좋습니다.',
      '충': '충(沖) 관계로 에너지가 부딪힙니다. 다름을 인정하고 소통이 중요해요.',
      '동일': '같은 띠입니다. 공감대는 넓지만, 서로의 단점도 잘 보일 수 있어요.',
      '보통': '특별한 합·충 관계는 아니지만, 노력으로 좋은 관계를 만들 수 있어요.'
    };

    function show() {
      var da = document.getElementById('birth-a').value;
      var db = document.getElementById('birth-b').value;
      if (!da || !db) return;
      var ya = SE.getYearPillar(da);
      var yb = SE.getYearPillar(db);
      var biA = SE.BRANCHES.indexOf(ya.branch);
      var biB = SE.BRANCHES.indexOf(yb.branch);
      var c = ZC.getCompat(biA, biB);

      document.getElementById('pair').textContent = ya.animal + '띠 × ' + yb.animal + '띠';
      document.getElementById('score').textContent = c.score + '%';
      var relEl = document.getElementById('rel');
      relEl.textContent = c.label;
      relEl.className = 'rel' + (c.type === '충' ? ' chung' : (c.type === '육합' || c.type === '삼합' ? ' yukhap' : ''));
      document.getElementById('detail').textContent =
        ya.animal + '띠(' + ya.pillar + '년)와 ' + yb.animal + '띠(' + yb.pillar + '년) — ' +
        (DETAIL[c.type] || DETAIL['보통']);
      document.getElementById('result').classList.add('show');
    }

    document.getElementById('btn-go').addEventListener('click', show);
  })();
  </script>
</body>
</html>
